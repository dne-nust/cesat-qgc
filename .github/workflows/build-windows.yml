name: Build cesat-qgc (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 6 (via aqtinstall)
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.6.0 win64_msvc2019_64

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:GITHUB_WORKSPACE\Qt\6.6.0\msvc2019_64" ..
          cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cesat-qgc-windows
          path: build/Release/cesat-qgc.exe
          retention-days: 14
